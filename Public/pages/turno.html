<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Servicios Escolares | Visualizar turno</title>
    <link rel="stylesheet" href="/styles/turno.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Visualización de turno">

        <div class="layout">

          <!-- LADO IZQUIERDO -->
          <div class="turno-panel">

            <!-- BLOQUE SUPERIOR -->
            <div class="top">

              <div class="counter" aria-label="Tiempo restante">
                <div class="counter-icon">🕒</div>
                <div class="counter-content">
                  <div class="counter-time" id="contador"></div>
                  <div class="counter-label">Tiempo restante</div>
                </div>
              </div>

              <div class="next" aria-label="Próximos turnos">
                <div class="next-header">
                  <span class="next-icon">🔔</span>
                  <span class="next-title">Próximos turnos</span>
                </div>

                <div class="next-list">
                  <div class="next-item" id="proximo-1"></div>
                  <div class="next-item" id="proximo-2"></div>
                </div>
              </div>

            </div>

            <!-- BLOQUE INFERIOR -->
            <div class="bottom">
              <div class="bottom-header">Turno actual</div>

              <div class="current-turn" id="turno-actual"></div>

              <button class="btn-cancel" type="button" id="btn-cancelar">
                Cancelar
              </button>
            </div>

          </div>

          <!-- LADO DERECHO (DOCUMENTACIÓN) -->
          <aside class="docs-panel">

            <h2 class="docs-title" id="titulo">Documentación necesaria</h2>

            <ul class="docs-list" id="lista-documentos">
            </ul>

          </aside>

        </div>

        <footer class="footer">© Servicios Escolares</footer>

      </section>
    </main>
      <script src="/js/turno.js"></script>
  </body>
</html>
