<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Servicios Escolares | Panel de Turnos</title>
    <link rel="stylesheet" href="/styles/visualizar_personal.css" />
  </head>

  <body>
    <div class="page">
      <div class="card">
        <!-- EN TURNO -->
        <div class="turn-header">
          <span id="usuario-turno">En turno: —</span>
        </div>

        <!-- PRÓXIMOS TURNOS -->
        <div class="panel">
          <div class="panel-title">🔔 Próximos turnos</div>

          <div class="turn" id="t1">—</div>
          <div class="turn" id="t2">—</div>
          <div class="turn" id="t3">—</div>
        </div>

        <!-- BOTONES -->
        <div class="actions">
          <a href="#" class="btn aceptar" id="btn-aceptar">Aceptar</a>
          <a href="#" class="btn rechazar" id="btn-rechazar">Rechazar</a>
          <a href="#" class="btn espera" id="btn-espera">Poner en espera</a>
        </div>
      </div>
    </div>

    <script src="/js/visualizar_personal.js"></script>
  </body>
</html>
