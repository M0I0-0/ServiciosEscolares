<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel Métricas</title>
<link rel="stylesheet" href="/styles/metricas.css">
</head>

<body>

<div class="page">

    <!-- ADMIN DROPDOWN -->
    <div class="user-menu">

        <div class="user-trigger" onclick="toggleMenu()">
            <span id="admin-name">Administrador</span>
            <span class="arrow">▼</span>
        </div>

        <div class="dropdown" id="dropdown">
            <a href="#">Cerrar sesión</a>
        </div>

    </div>


    <!-- TARJETA CENTRAL -->
    <div class="card">

        <h1 class="title">MES</h1>

        <!-- GRAFICA -->
        <div class="chart">
            <img src="/images/grafica.png" alt="grafica">
        </div>

        <!-- BOTONES -->
        <div class="buttons">

            <a href="#" class="btn">
                ⬆ Exportar
            </a>

            <a href="#" class="btn">
                ↩ Regresar
            </a>

        </div>

    </div>

</div>


<script>

function toggleMenu(){
    document.getElementById("dropdown").classList.toggle("show");
}

</script>

</body>
</html>
